<template>
    <div class="page">
        <div class="page-header">
            <div class="hi">
                <div>
                    <h1>Models &amp; Variants</h1>
                    <p>All active car models in the portal</p>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="table-wrap">
                <template if:true={loading}><div class="loading"><div class="spin"></div> Loading models...</div></template>
                <template if:true={empty}><div class="empty">🚗 No models found</div></template>
                <template if:false={loading}>
                    <table>
                        <thead>
                            <tr>
                                <th>Model Name</th>
                                <th>Description</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={models} for:item="m">
                                <tr key={m.Id} class="trow">
                                    <td class="td-title">{m.Name}</td>
                                    <td>{m.Description__c}</td>
                                    <td>
                                        <template if:true={m.Is_Active__c}>
                                            <span class="badge green">Active</span>
                                        </template>
                                        <template if:false={m.Is_Active__c}>
                                            <span class="badge red">Inactive</span>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>
        </div>
    </div>
</template>
