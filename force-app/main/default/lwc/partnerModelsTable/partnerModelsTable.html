<template>
    <div class="table-card">
        <template if:true={loading}><div class="loading-wrap"><div class="spinner"></div> Loading...</div></template>
        <template if:true={empty}><div class="empty-state">🚗 No models found</div></template>
        <template if:false={loading}>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Model Name</th>
                        <th>Description</th>
                        <th>Active</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={models} for:item="m">
                        <tr key={m.Id} class="table-row">
                            <td class="cell-title">{m.Name}</td>
                            <td>{m.Description__c}</td>
                            <td>
                                <template if:true={m.Is_Active__c}>
                                    <span class="badge approved">Active</span>
                                </template>
                                <template if:false={m.Is_Active__c}>
                                    <span class="badge cancelled">Inactive</span>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
    </div>
</template>
