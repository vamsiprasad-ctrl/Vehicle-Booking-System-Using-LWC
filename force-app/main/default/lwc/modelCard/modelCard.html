<template>
    <div class="mcard" onclick={handleClick}>
        <div class="mcard-img">
            <img src={car.img} alt={car.name} loading="lazy"/>
            <div class={tagClass}>{car.tag}</div>
            <button class={wishClass} onclick={handleWish} title="Wishlist">{wishIcon}</button>
        </div>
        <div class="mcard-body">
            <div class="mc-name">{car.name}</div>
            <div class="mc-sub">{car.badge} &middot; {car.cat}</div>
            <div class="mc-price">{priceFormatted} <small>onwards</small></div>
            <div class="mc-pills">
                <template for:each={carPills} for:item="pill">
                    <span key={pill} class="mpill">{pill}</span>
                </template>
            </div>
            <div class="mc-footer">
                <button class="btn-td" onclick={handleTestDrive}>Test Drive</button>
                <button class="btn-ex" onclick={handleExplore}>Explore &#8594;</button>
            </div>
        </div>
    </div>
</template>
