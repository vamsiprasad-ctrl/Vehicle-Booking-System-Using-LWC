<template>
    <div class="testdrives-page">
        <div class="page-header">
            <div class="header-inner">
                <div class="breadcrumb">
                    <span onclick={goDashboard} class="bc-link">Dashboard</span>
                    <i class="ti ti-chevron-right bc-sep" aria-hidden="true"></i>
                    <span class="bc-current">My Test Drives</span>
                </div>
                <h1 class="page-title">My Test Drives</h1>
                <p class="page-sub">History of all your Tata Motors test drive requests</p>
            </div>
        </div>

        <div class="page-body">
            <div class="body-inner">

                <div class="filter-row">
                    <select class="filter-select" onchange={handleFilter}>
                        <option value="all">All Status</option>
                        <option value="Requested">Requested</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                    <button class="btn-book-new" onclick={bookNew}>
                        <i class="ti ti-calendar-plus" aria-hidden="true"></i> Book Another
                    </button>
                    <span class="count-label">{filteredTestDrives.length} test drive(s)</span>
                </div>

                <template if:true={loading}>
                    <div class="loading-wrap"><div class="spinner"></div><p>Loading...</p></div>
                </template>

                <template if:true={isEmpty}>
                    <div class="empty-state">
                        <i class="ti ti-steering-wheel" aria-hidden="true"></i>
                        <h3>No test drives yet</h3>
                        <p>Book your first test drive today!</p>
                        <button onclick={bookNew}>Book Test Drive</button>
                    </div>
                </template>

                <div class="td-grid">
                    <template for:each={filteredTestDrives} for:item="td">
                        <div key={td.Id} class="td-card">
                            <div class="td-header">
                                <div>
                                    <div class="td-car">{td.modelName}</div>
                                    <div class="td-variant">{td.variantName}</div>
                                </div>
                                <div class={td.statusClass}>{td.Status__c}</div>
                            </div>
                            <div class="td-details">
                                <div class="td-detail">
                                    <i class="ti ti-calendar" aria-hidden="true"></i>
                                    <div>
                                        <div class="td-dl">Preferred Date &amp; Time</div>
                                        <div class="td-dv">{td.preferredDateFormatted}</div>
                                    </div>
                                </div>
                            </div>
                            <template if:true={td.Notes__c}>
                                <div class="td-notes">
                                    <i class="ti ti-notes" aria-hidden="true"></i>
                                    <span>{td.Notes__c}</span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

            </div>
        </div>
    </div>
</template>
