<template>
    <div class="page-wrap">
        <div class="page-header">
            <div class="header-inner">
                <div>
                    <h1>Reports</h1>
                    <p>Business overview and performance metrics</p>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="body-inner">

                <div class="reports-grid">
                    <div class="report-card">
                        <h3>Booking Summary</h3>
                        <div class="report-stats">
                            <div class="rs-item">
                                <div class="rs-num">{stats.totalBookings}</div>
                                <div class="rs-label">Total Bookings</div>
                            </div>
                            <div class="rs-item">
                                <div class="rs-num">{stats.pendingApprovals}</div>
                                <div class="rs-label">Pending</div>
                            </div>
                            <div class="rs-item">
                                <div class="rs-num">{stats.approvedBookings}</div>
                                <div class="rs-label">Approved</div>
                            </div>
                            <div class="rs-item">
                                <div class="rs-num">{stats.deliveredBookings}</div>
                                <div class="rs-label">Delivered</div>
                            </div>
                        </div>
                    </div>

                    <div class="report-card">
                        <h3>Lead Pipeline</h3>
                        <div class="report-stats">
                            <div class="rs-item">
                                <div class="rs-num">{stats.totalLeads}</div>
                                <div class="rs-label">Total Leads</div>
                            </div>
                            <div class="rs-item">
                                <div class="rs-num">{stats.newLeads}</div>
                                <div class="rs-label">New</div>
                            </div>
                        </div>
                    </div>

                    <div class="report-card">
                        <h3>Test Drive Activity</h3>
                        <div class="report-stats">
                            <div class="rs-item">
                                <div class="rs-num">{stats.totalTestDrives}</div>
                                <div class="rs-label">Total</div>
                            </div>
                            <div class="rs-item">
                                <div class="rs-num">{stats.scheduledTestDrives}</div>
                                <div class="rs-label">Confirmed</div>
                            </div>
                        </div>
                    </div>

                    <div class="report-card highlight">
                        <h3>Revenue This Month</h3>
                        <div class="revenue-big">₹{monthlyRevenueFmt}</div>
                        <p class="revenue-sub">Total collected payments this month</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</template>
