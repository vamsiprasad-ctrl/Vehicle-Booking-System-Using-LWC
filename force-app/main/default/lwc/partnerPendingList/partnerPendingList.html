<template>
    <div class="pending-list">
        <template if:true={loading}>
            <div class="loading-wrap"><div class="spinner"></div> Loading...</div>
        </template>
        <template if:true={empty}>
            <div class="empty-state">
                <div class="empty-icon">✅</div>
                <h3>All caught up!</h3>
                <p>No bookings are pending approval right now.</p>
            </div>
        </template>
        <template for:each={bookings} for:item="b">
            <div key={b.Id} class="booking-card">
                <div class="card-top">
                    <div class="card-info">
                        <div class="customer-name">{b.Contact__r.FirstName} {b.Contact__r.LastName}</div>
                        <div class="booking-meta">
                            #{b.Booking_Number__c} · {b.Contact__r.Phone}
                        </div>
                        <div class="booking-meta">
                            Submitted by: {b.Owner.Name}
                        </div>
                    </div>
                    <div class="card-vehicle">
                        <div class="vehicle-name">{b.Model__r.Name}</div>
                        <div class="vehicle-variant">{b.Variant__r.Name}</div>
                        <div class="vehicle-amount">₹{b.amountFormatted}</div>
                    </div>
                    <div class="card-dates">
                        <div class="date-label">Booking Date</div>
                        <div class="date-val">{b.Booking_Date__c}</div>
                        <div class="date-label">Expected Delivery</div>
                        <div class="date-val">{b.Expected_Delivery_Date__c}</div>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-approve" data-id={b.Id} onclick={approveBooking}>
                        ✅ Approve
                    </button>
                    <div class="reject-group">
                        <input type="text" class="reject-input"
                               placeholder="Rejection reason..."
                               data-id={b.Id}
                               onchange={handleReason}/>
                        <button class="btn-reject" data-id={b.Id} onclick={rejectBooking}>
                            ❌ Reject
                        </button>
                    </div>
                </div>

                <template if:true={b.successMsg}>
                    <div class="success-msg">{b.successMsg}</div>
                </template>
                <template if:true={b.errorMsg}>
                    <div class="error-msg">{b.errorMsg}</div>
                </template>
            </div>
        </template>
    </div>
</template>
