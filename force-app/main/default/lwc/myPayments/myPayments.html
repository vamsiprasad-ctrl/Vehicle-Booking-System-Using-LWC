<template>
    <div class="container">

        <!-- SUCCESS STATE -->
        <template if:true={paymentSuccess}>
            <div class="success-container">
                <div class="success-icon">✓</div>
                <h2>Payment Successful!</h2>
                <div class="success-details">
                    <p class="success-msg">
                        Your payment of <strong>{paymentAmountFormatted}</strong> has been processed successfully.
                    </p>
                    <div class="booking-info">
                        <div class="info-row">
                            <span class="label">Model:</span>
                            <span class="value">{modelName}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Variant:</span>
                            <span class="value">{variantName}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Total Amount:</span>
                            <span class="value">{totalFormatted}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Amount Paid:</span>
                            <span class="value paid">{paidFormatted}</span>
                        </div>
                        <template if:true={remainingBalance}>
                        <div class="info-row">
                            <span class="label">Remaining Balance:</span>
                            <span class="value pending">{remainingFormatted}</span>
                        </div>
                        </template>
                    </div>
                    <p class="success-note">
                        A payment confirmation email has been sent to your registered email address.
                    </p>
                </div>
                <button class="back-button" onclick={handleGoBack}>Back to Bookings</button>
            </div>
        </template>

        <!-- PAYMENT FORM STATE -->
        <template if:false={paymentSuccess}>
            <!-- BACK BUTTON -->
            <button class="back-link" onclick={handleGoBack}>← Back to My Bookings</button>

            <!-- PAGE TITLE -->
            <h1 class="page-title">Make Payment</h1>

            <!-- BOOKING SUMMARY -->
            <div class="booking-summary">
                <h3 class="summary-title">Booking Details</h3>
                <div class="vehicle-info">
                    <div class="vehicle-name">{modelName}</div>
                    <div class="vehicle-variant">{variantName}</div>
                </div>
                
                <div class="payment-info">
                    <div class="info-item">
                        <span class="info-label">Total Booking Amount</span>
                        <span class="info-value">{totalFormatted}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Already Paid</span>
                        <span class="info-value paid">{paidFormatted}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Remaining Balance</span>
                        <span class="info-value pending">{remainingFormatted}</span>
                    </div>
                </div>

                <!-- PROGRESS BAR -->
                <div class="progress-container">
                    <div class="progress-label">
                        <span>Payment Progress</span>
                        <span>{progressPercent}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: {progressPercent}%"></div>
                    </div>
                </div>
            </div>

            <!-- PAYMENT SECTION -->
            <div class="payment-section">
                <h3 class="section-title">Payment Details</h3>

                <!-- PAYMENT METHOD -->
                <div class="form-group">
                    <label class="form-label">Payment Method <span class="required">*</span></label>
                    <select class="form-input" onchange={handlePaymentMethodChange} value={paymentMethod}>
                        <option value="Credit Card">Credit Card</option>
                        <option value="Debit Card">Debit Card</option>
                        <option value="Net Banking">Net Banking</option>
                        <option value="UPI">UPI</option>
                    </select>
                </div>

                <!-- PAYMENT AMOUNT -->
                <div class="form-group">
                    <label class="form-label">Payment Amount <span class="required">*</span></label>
                    <div class="amount-input-group">
                        <span class="currency">₹</span>
                        <input class="form-input amount-input" 
                               type="number" 
                               value={paymentAmount}
                               max={remainingBalance}
                               min="0"
                               step="1000"
                               onchange={handleAmountChange}/>
                    </div>
                    <template if:true={errors.amount}>
                        <span class="error-msg">{errors.amount}</span>
                    </template>
                    <p class="help-text">
                        <span>Max payable: {remainingFormatted}</span>
                        <template if:true={isFullPayment}>
                            <span class="badge">Full Payment</span>
                        </template>
                    </p>
                </div>

                <!-- CARD DETAILS (for Credit Card) -->
                <template if:true={isCardMethod}>
                    <div class="card-details">
                        <div class="form-group">
                            <label class="form-label">Cardholder Name <span class="required">*</span></label>
                            <input class="form-input" 
                                   type="text" 
                                   name="cardName"
                                   placeholder="John Doe"
                                   oninput={handleCardInput}/>
                            <template if:true={errors.cardName}>
                                <span class="error-msg">{errors.cardName}</span>
                            </template>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Card Number <span class="required">*</span></label>
                            <input class="form-input" 
                                   type="text" 
                                   name="cardNumber"
                                   placeholder="1234 5678 9012 3456"
                                   maxlength="19"
                                   oninput={handleCardInput}/>
                            <template if:true={errors.cardNumber}>
                                <span class="error-msg">{errors.cardNumber}</span>
                            </template>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Expiry Date <span class="required">*</span></label>
                                <input class="form-input" 
                                       type="text" 
                                       name="expiryDate"
                                       placeholder="MM/YY"
                                       maxlength="5"
                                       oninput={handleCardInput}/>
                                <template if:true={errors.expiryDate}>
                                    <span class="error-msg">{errors.expiryDate}</span>
                                </template>
                            </div>
                            <div class="form-group">
                                <label class="form-label">CVV <span class="required">*</span></label>
                                <input class="form-input" 
                                       type="text" 
                                       name="cvv"
                                       placeholder="123"
                                       maxlength="4"
                                       oninput={handleCardInput}/>
                                <template if:true={errors.cvv}>
                                    <span class="error-msg">{errors.cvv}</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- ERROR MESSAGE -->
            <template if:true={error}>
                <div class="error-banner">
                    <span>⚠️ {error}</span>
                </div>
            </template>

            <!-- SUBMIT BUTTON -->
            <button class="submit-button" 
                    onclick={handleSubmit}
                    disabled={isProcessing}>
                <template if:false={isProcessing}>
                    <span>Confirm Payment</span>
                    <span class="amount-badge">{paymentAmountFormatted}</span>
                </template>
                <template if:true={isProcessing}>
                    <span class="spinner"></span> Processing...
                </template>
            </button>

            <!-- SECURITY NOTICE -->
            <div class="security-notice">
                <span class="lock-icon">🔒</span>
                Your payment is secured with 256-bit SSL encryption
            </div>
        </template>
    </div>
</template>
