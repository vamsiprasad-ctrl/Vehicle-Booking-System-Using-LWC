<template>
    <div class="my-stats">
        <h3>My Performance</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-num">{stats.totalLeads}</div>
                <div class="stat-label">Leads Handled</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚗</div>
                <div class="stat-num">{stats.totalTestDrives}</div>
                <div class="stat-label">Test Drives</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-num">{stats.totalBookings}</div>
                <div class="stat-label">Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-num">{stats.deliveredBookings}</div>
                <div class="stat-label">Delivered</div>
            </div>
        </div>
    </div>
</template>
