<template>
    <div class="page-wrap">
        <div class="page-header">
            <div class="header-inner">
                <div>
                    <h1>Test Drives</h1>
                    <p>Manage test drive requests and schedules</p>
                </div>
                <button class="btn-today" onclick={toggleToday}>
                    {todayLabel}
                </button>
            </div>
        </div>
        <div class="page-body">
            <div class="body-inner">
                <c-partner-test-drives-filter
                    onfilterchange={handleFilter}>
                </c-partner-test-drives-filter>
                <c-partner-test-drives-table
                    test-drives={testDrives}
                    loading={loading}
                    onactionrequest={handleAction}>
                </c-partner-test-drives-table>
                <template if:true={showActionModal}>
                    <c-partner-test-drive-actions
                        test-drive={selectedTD}
                        onclose={closeModal}
                        onrefresh={refreshData}>
                    </c-partner-test-drive-actions>
                </template>
            </div>
        </div>
    </div>
</template>
