<template>
    <div class="slds-m-around_medium">
        <div class="slds-page-header slds-m-bottom_medium">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:product"
                                size="medium">
                            </lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-page-header__title">
                                Tata Motors — Explore Our Models
                            </h1>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-m-top_large">
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-notify slds-notify_alert
                        slds-alert_error" role="alert">
                <span>Unable to load models. Please try again.</span>
            </div>
        </template>

        <div class="slds-grid slds-wrap slds-gutters">
            <template for:each={models} for:item="model">
                <div key={model.Id}
                    class="slds-col slds-size_1-of-1
                           slds-medium-size_1-of-2
                           slds-large-size_1-of-3
                           slds-m-bottom_medium">
                    <article class="slds-card">
                        <div class="slds-card__header slds-grid">
                            <header class="slds-media slds-media_center
                                          slds-has-flexi-truncate">
                                <div class="slds-media__figure">
                                    <lightning-icon
                                        icon-name="standard:product"
                                        size="small">
                                    </lightning-icon>
                                </div>
                                <div class="slds-media__body">
                                    <h2 class="slds-card__header-title">
                                        <span>{model.Name}</span>
                                    </h2>
                                </div>
                            </header>
                        </div>
                        <div class="slds-card__body slds-card__body_inner">
                            <template if:true={model.Image_URL__c}>
                                <img src={model.Image_URL__c}
                                    alt={model.Name}
                                    class="slds-m-bottom_small"
                                    style="width:100%;
                                           height:180px;
                                           object-fit:cover;
                                           border-radius:4px"/>
                            </template>
                            <p class="slds-text-body_regular
                                      slds-m-bottom_small">
                                {model.Description__c}
                            </p>
                        </div>
                        <div class="slds-card__footer">
                            <lightning-button
                                label="Explore Variants"
                                variant="brand"
                                data-id={model.Id}
                                onclick={handleModelClick}>
                            </lightning-button>
                        </div>
                    </article>
                </div>
            </template>
        </div>
    </div>
</template>
