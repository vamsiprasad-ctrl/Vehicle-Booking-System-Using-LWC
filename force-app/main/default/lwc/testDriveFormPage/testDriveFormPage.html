<template>
    <div class="form-page">

        <!-- Page Header -->
        <div class="page-header">
            <div class="header-content">
                <button class="btn-back"
                        onclick={handleBack}>
                    ← Back to Variants
                </button>
                <h1 class="page-title">Your Details</h1>
                <p class="page-subtitle">
                    Fill in your details to confirm
                    the test drive
                </p>
            </div>
            <!-- Progress -->
            <div class="progress-bar">
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Select Model</span>
                </div>
                <div class="step-line step-line-done"></div>
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Select Variant</span>
                </div>
                <div class="step-line step-line-done"></div>
                <div class="step step-active">
                    <div class="step-circle">3</div>
                    <span>Your Details</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">4</div>
                    <span>Confirm</span>
                </div>
            </div>
        </div>

        <!-- Form Container -->
        <div class="form-container">
            <div class="form-card">

                <!-- Selected Model & Variant Summary -->
                <div class="selection-summary">
                    <div class="summary-item">
                        <span class="summary-label">
                            Selected Model
                        </span>
                        <span class="summary-value">
                            {modelName}
                        </span>
                    </div>
                    <div class="summary-divider">→</div>
                    <div class="summary-item">
                        <span class="summary-label">
                            Selected Variant
                        </span>
                        <span class="summary-value">
                            {variantName}
                        </span>
                    </div>
                    <button class="btn-change"
                            onclick={handleBack}>
                        Change
                    </button>
                </div>

                <!-- Form Fields -->
                <div class="form-body">
                    <h3 class="form-section-title">
                        Personal Information
                    </h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                First Name *
                            </label>
                            <input type="text"
                                   class={firstNameClass}
                                   placeholder="Enter first name"
                                   data-field="firstName"
                                   value={formData.firstName}
                                   onchange={handleChange}/>
                            <template if:true={errors.firstName}>
                                <span class="field-error">
                                    {errors.firstName}
                                </span>
                            </template>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                Last Name *
                            </label>
                            <input type="text"
                                   class={lastNameClass}
                                   placeholder="Enter last name"
                                   data-field="lastName"
                                   value={formData.lastName}
                                   onchange={handleChange}/>
                            <template if:true={errors.lastName}>
                                <span class="field-error">
                                    {errors.lastName}
                                </span>
                            </template>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">
                                Email Address *
                            </label>
                            <input type="email"
                                   class={emailClass}
                                   placeholder="your@email.com"
                                   data-field="email"
                                   value={formData.email}
                                   onchange={handleChange}/>
                            <template if:true={errors.email}>
                                <span class="field-error">
                                    {errors.email}
                                </span>
                            </template>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                Phone Number *
                            </label>
                            <input type="tel"
                                   class={phoneClass}
                                   placeholder="10 digit number"
                                   data-field="phone"
                                   maxlength="10"
                                   value={formData.phone}
                                   onchange={handleChange}/>
                            <template if:true={errors.phone}>
                                <span class="field-error">
                                    {errors.phone}
                                </span>
                            </template>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text"
                                   class="form-input"
                                   placeholder="Your city"
                                   data-field="city"
                                   value={formData.city}
                                   onchange={handleChange}/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">
                                Preferred Date & Time *
                            </label>
                            <input type="datetime-local"
                                   class={dateTimeClass}
                                   data-field="preferredDateTime"
                                   value={formData.preferredDateTime}
                                   onchange={handleChange}/>
                            <template if:true={errors.preferredDateTime}>
                                <span class="field-error">
                                    {errors.preferredDateTime}
                                </span>
                            </template>
                        </div>
                    </div>

                    <!-- Error Banner -->
                    <template if:true={hasGeneralError}>
                        <div class="error-banner">
                            ⚠️ {generalError}
                        </div>
                    </template>

                    <!-- Submit Button -->
                    <button class="btn-submit"
                            onclick={handleSubmit}
                            disabled={isSubmitting}>
                        <template if:true={isSubmitting}>
                            <span class="btn-spinner"></span>
                            Submitting...
                        </template>
                        <template if:false={isSubmitting}>
                            Confirm Test Drive Booking →
                        </template>
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
