<template>
    <div class="detail-page">

        <template if:true={loading}>
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p>Loading model details...</p>
            </div>
        </template>

        <template if:false={loading}>
            <template if:true={model}>

                <div class="detail-hero">
                    <div class="hero-inner">
                        <div class="breadcrumb">
                            <span onclick={goHome} class="bc-link">Home</span>
                            <i class="ti ti-chevron-right bc-sep" aria-hidden="true"></i>
                            <span onclick={goModels} class="bc-link">Models</span>
                            <i class="ti ti-chevron-right bc-sep" aria-hidden="true"></i>
                            <span class="bc-current">{model.Name}</span>
                        </div>
                        <div class="hero-layout">
                            <div class="hero-left">
                                <h1 class="model-title">{model.Name}</h1>
                                <p class="model-desc">{model.Description__c}</p>
                                <div class="highlights">
                                    <div class="highlight-item">
                                        <i class="ti ti-gas-station" aria-hidden="true"></i>
                                        <div>
                                            <div class="hl-label">Fuel Options</div>
                                            <div class="hl-val">{fuelOptions}</div>
                                        </div>
                                    </div>
                                    <div class="highlight-item">
                                        <i class="ti ti-settings" aria-hidden="true"></i>
                                        <div>
                                            <div class="hl-label">Transmission</div>
                                            <div class="hl-val">{transmissionOptions}</div>
                                        </div>
                                    </div>
                                    <div class="highlight-item">
                                        <i class="ti ti-list" aria-hidden="true"></i>
                                        <div>
                                            <div class="hl-label">Variants</div>
                                            <div class="hl-val">{variants.length} options</div>
                                        </div>
                                    </div>
                                    <div class="highlight-item">
                                        <i class="ti ti-currency-rupee" aria-hidden="true"></i>
                                        <div>
                                            <div class="hl-label">Price Range</div>
                                            <div class="hl-val">{priceRange}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="hero-right">
                                <template if:true={modelDisplayImage}>
                                    <img src={modelDisplayImage} alt={model.Name} class="hero-img"/>
                                </template>
                                <template if:false={modelDisplayImage}>
                                    <div class="hero-img-placeholder">
                                        <i class="ti ti-car" aria-hidden="true"></i>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="variants-section">
                    <div class="variants-inner">
                        <h2 class="section-title">Choose Your Variant</h2>
                        <p class="section-sub">Select a variant to proceed with booking a test drive</p>

                        <template if:true={loadingVariants}>
                            <div class="loading-wrap">
                                <div class="spinner"></div>
                                <p>Loading variants...</p>
                            </div>
                        </template>

                        <div class="variants-grid">
                            <template for:each={variants} for:item="variant">
                                <div key={variant.Id}
                                     class={variant.cardClass}
                                     data-id={variant.Id}
                                     onclick={selectVariant}>
                                    <template if:true={variant.variantImage}>
                                        <img src={variant.variantImage} alt={variant.Name} class="variant-img" loading="lazy"/>
                                    </template>
                                    <div class="variant-header">
                                        <div class="variant-name">{variant.Name}</div>
                                        <template if:true={variant.isSelected}>
                                            <div class="selected-badge">
                                                <i class="ti ti-check" aria-hidden="true"></i> Selected
                                            </div>
                                        </template>
                                    </div>
                                    <div class="variant-price">₹{variant.priceFormatted}</div>
                                    <div class="variant-specs">
                                        <div class="spec-tag">
                                            <i class="ti ti-gas-station" aria-hidden="true"></i> {variant.Fuel_Type__c}
                                        </div>
                                        <div class="spec-tag">
                                            <i class="ti ti-settings" aria-hidden="true"></i> {variant.Transmission__c}
                                        </div>
                                        <template if:true={variant.Color_Options__c}>
                                            <div class="spec-tag">
                                                <i class="ti ti-palette" aria-hidden="true"></i> {variant.Color_Options__c}
                                            </div>
                                        </template>
                                    </div>
                                    <button class="btn-select" data-id={variant.Id} onclick={selectVariant}>
                                        <template if:true={variant.isSelected}>
                                            <i class="ti ti-check" aria-hidden="true"></i> Selected
                                        </template>
                                        <template if:false={variant.isSelected}>
                                            Select This Variant
                                        </template>
                                    </button>
                                </div>
                            </template>
                        </div>

                        <div class="book-bar">
                            <div class="book-bar-left">
                                <template if:true={selectedVariant}>
                                    <span class="selected-info">
                                        <i class="ti ti-check-circle" aria-hidden="true"></i>
                                        {model.Name} — {selectedVariant.Name} — ₹{selectedVariant.priceFormatted}
                                    </span>
                                </template>
                                <template if:false={selectedVariant}>
                                    <span class="select-hint">
                                        <i class="ti ti-info-circle" aria-hidden="true"></i>
                                        Please select a variant above to continue
                                    </span>
                                </template>
                            </div>
                            <button class={bookBtnClass} onclick={bookTestDrive} disabled={noVariantSelected}>
                                <i class="ti ti-calendar" aria-hidden="true"></i>
                                Book Test Drive
                            </button>
                        </div>

                    </div>
                </div>

            </template>

            <template if:false={model}>
                <div class="error-state">
                    <i class="ti ti-alert-circle" aria-hidden="true"></i>
                    <h2>Model not found</h2>
                    <p>The model you're looking for doesn't exist or is no longer available.</p>
                    <button onclick={goModels}>Browse All Models</button>
                </div>
            </template>
        </template>

    </div>
</template>
