<template>
    <div class="success-page">

        <!-- Progress Complete -->
        <div class="page-header">
            <div class="progress-bar">
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Select Model</span>
                </div>
                <div class="step-line step-line-done"></div>
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Select Variant</span>
                </div>
                <div class="step-line step-line-done"></div>
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Your Details</span>
                </div>
                <div class="step-line step-line-done"></div>
                <div class="step step-done">
                    <div class="step-circle">✓</div>
                    <span>Confirmed</span>
                </div>
            </div>
        </div>

        <!-- Success Content -->
        <div class="success-container">
            <div class="success-card">

                <!-- Success Icon -->
                <div class="success-icon">
                    <div class="check-circle">✓</div>
                </div>

                <h1 class="success-title">
                    Request Submitted Successfully!
                </h1>
                <p class="success-subtitle">
                    Thank you for choosing Tata Motors
                </p>

                <!-- Booking Summary -->
                <div class="booking-summary">
                    <div class="summary-row">
                        <span class="summary-label">Model</span>
                        <span class="summary-value">
                            {modelName}
                        </span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Variant</span>
                        <span class="summary-value">
                            {variantName}
                        </span>
                    </div>
                </div>

                <!-- What Happens Next -->
                <div class="next-steps">
                    <h3 class="next-steps-title">
                        What Happens Next?
                    </h3>
                    <div class="step-list">
                        <div class="next-step">
                            <div class="next-step-number">1</div>
                            <div class="next-step-text">
                                <strong>
                                    Email Confirmation Sent
                                </strong>
                                <p>
                                    Check your inbox for a
                                    confirmation email
                                </p>
                            </div>
                        </div>
                        <div class="next-step">
                            <div class="next-step-number">2</div>
                            <div class="next-step-text">
                                <strong>
                                    Sales Executive Will Call
                                </strong>
                                <p>
                                    Our team will contact you
                                    within 24 hours
                                </p>
                            </div>
                        </div>
                        <div class="next-step">
                            <div class="next-step-number">3</div>
                            <div class="next-step-text">
                                <strong>
                                    Test Drive Confirmed
                                </strong>
                                <p>
                                    We will confirm your
                                    appointment slot
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="success-actions">
                    <button class="btn-new-booking"
                            onclick={handleNewBooking}>
                        Book Another Test Drive
                    </button>
                    <a href="/customer/home"
                       class="btn-home">
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</template>
