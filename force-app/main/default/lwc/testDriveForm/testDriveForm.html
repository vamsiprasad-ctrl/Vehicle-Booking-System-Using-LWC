<template>
    <div class="form-page">
        <div class="form-header">
            <div class="header-inner">
                <div class="breadcrumb">
                    <span onclick={goHome} class="bc-link">Home</span>
                    <i class="ti ti-chevron-right bc-sep" aria-hidden="true"></i>
                    <span onclick={goModels} class="bc-link">Models</span>
                    <i class="ti ti-chevron-right bc-sep" aria-hidden="true"></i>
                    <span class="bc-current">Book Test Drive</span>
                </div>
                <h1 class="page-title">Book a Test Drive</h1>
                <p class="page-sub">Experience the thrill before you decide</p>
            </div>
        </div>

        <div class="form-body">
            <div class="form-inner">

                <!-- Success state -->
                <template if:true={submitted}>
                    <div class="success-card">
                        <div class="success-icon">
                            <i class="ti ti-circle-check" aria-hidden="true"></i>
                        </div>
                        <h2 class="success-title">Test Drive Booked!</h2>
                        <p class="success-msg">
                            Thank you, {firstName}! Your test drive request has been received.
                            Our team will contact you within 24 hours to confirm your appointment.
                        </p>
                        <div class="success-details">
                            <div class="sd-row"><span>Model</span><strong>{modelName}</strong></div>
                            <div class="sd-row"><span>Variant</span><strong>{variantName}</strong></div>
                            <div class="sd-row"><span>City</span><strong>{city}</strong></div>
                        </div>
                        <div class="success-actions">
                            <button class="btn-primary" onclick={goModels}>Explore More Models</button>
                            <button class="btn-outline" onclick={goHome}>Back to Home</button>
                        </div>
                    </div>
                </template>

                <template if:false={submitted}>
                    <div class="form-layout">

                        <!-- Left panel — car summary -->
                        <div class="summary-panel">
                            <template if:true={hasModel}>
                                <div class="summary-card">
                                    <template if:true={modelImageUrl}>
                                        <img src={modelImageUrl} alt={modelName} class="summary-img"/>
                                    </template>
                                    <template if:false={modelImageUrl}>
                                        <div class="summary-img-placeholder">
                                            <i class="ti ti-car" aria-hidden="true"></i>
                                        </div>
                                    </template>
                                    <div class="summary-body">
                                        <div class="summary-label">Selected Vehicle</div>
                                        <h2 class="summary-model">{modelName}</h2>
                                        <div class="summary-variant">{variantName}</div>
                                        <template if:true={price}>
                                            <div class="summary-price">₹{priceFormatted}</div>
                                        </template>
                                    </div>
                                </div>
                                <div class="info-box">
                                    <i class="ti ti-info-circle" aria-hidden="true"></i>
                                    <p>Test drives are free with no purchase obligation. A sales executive will confirm your slot within 24 hours.</p>
                                </div>
                            </template>
                            <template if:false={hasModel}>
                                <div class="no-model-box">
                                    <i class="ti ti-car-off" aria-hidden="true"></i>
                                    <p>No vehicle selected.</p>
                                    <button onclick={goModels}>Browse Models</button>
                                </div>
                            </template>
                        </div>

                        <!-- Right panel — form -->
                        <div class="form-panel">
                            <h2 class="form-title">Your Details</h2>

                            <template if:true={errorMsg}>
                                <div class="error-banner">
                                    <i class="ti ti-alert-circle" aria-hidden="true"></i>
                                    {errorMsg}
                                </div>
                            </template>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" class={firstNameClass}
                                           placeholder="Enter first name"
                                           value={firstName}
                                           onchange={handleFirstName}/>
                                    <template if:true={firstNameError}>
                                        <span class="field-error">{firstNameError}</span>
                                    </template>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" class={lastNameClass}
                                           placeholder="Enter last name"
                                           value={lastName}
                                           onchange={handleLastName}/>
                                    <template if:true={lastNameError}>
                                        <span class="field-error">{lastNameError}</span>
                                    </template>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Email Address *</label>
                                <input type="email" class={emailClass}
                                       placeholder="yourname@email.com"
                                       value={email}
                                       onchange={handleEmail}/>
                                <template if:true={emailError}>
                                    <span class="field-error">{emailError}</span>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Mobile Number *</label>
                                <input type="tel" class={phoneClass}
                                       placeholder="10-digit mobile number"
                                       value={phone}
                                       maxlength="10"
                                       onchange={handlePhone}/>
                                <template if:true={phoneError}>
                                    <span class="field-error">{phoneError}</span>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">City *</label>
                                <select class={cityClass} onchange={handleCity}>
                                    <option value="">— Select your city —</option>
                                    <template for:each={cities} for:item="c">
                                        <option key={c} value={c}>{c}</option>
                                    </template>
                                </select>
                                <template if:true={cityError}>
                                    <span class="field-error">{cityError}</span>
                                </template>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Preferred Date *</label>
                                    <input type="date" class={dateClass}
                                           min={minDate}
                                           max={maxDate}
                                           value={preferredDate}
                                           onchange={handleDate}/>
                                    <template if:true={dateError}>
                                        <span class="field-error">{dateError}</span>
                                    </template>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Preferred Time *</label>
                                    <select class={timeClass} onchange={handleTime}>
                                        <option value="">— Select time slot —</option>
                                        <template for:each={timeSlots} for:item="slot">
                                            <option key={slot.value} value={slot.value}>{slot.label}</option>
                                        </template>
                                    </select>
                                    <template if:true={timeError}>
                                        <span class="field-error">{timeError}</span>
                                    </template>
                                </div>
                            </div>

                            <button class="btn-submit" onclick={handleSubmit} disabled={submitting}>
                                <template if:true={submitting}>
                                    <div class="btn-spinner"></div> Submitting...
                                </template>
                                <template if:false={submitting}>
                                    <i class="ti ti-calendar-check" aria-hidden="true"></i>
                                    Confirm Test Drive Booking
                                </template>
                            </button>

                            <p class="form-note">
                                <i class="ti ti-lock" aria-hidden="true"></i>
                                Your information is secure and will never be shared.
                            </p>
                        </div>

                    </div>
                </template>

            </div>
        </div>
    </div>
</template>
