<template>
    <div class="page">

        <!-- ═══════════════════════════════════════ -->
        <!-- MANAGER DASHBOARD                       -->
        <!-- ═══════════════════════════════════════ -->
        <template if:true={isManager}>

            <div class="mgr-header">
                <div class="mgr-header-inner">
                    <div class="mgr-greeting">
                        <div class="mgr-badge">🏆 Sales Manager</div>
                        <h1>Good {timeOfDay}, {firstName}!</h1>
                        <p>Here's your team's performance overview</p>
                    </div>
                    <div class="mgr-quick">
                        <button class="q-btn" onclick={goApprovals}>
                            <span class="q-num">{stats.pendingApprovals}</span>
                            <span class="q-label">Pending Approvals</span>
                        </button>
                        <button class="q-btn green" onclick={goReports}>
                            <span class="q-num">₹{monthlyRevFmt}</span>
                            <span class="q-label">Revenue This Month</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mgr-body">

                <!-- Alert -->
                <template if:true={hasPendingApprovals}>
                    <div class="alert-bar" onclick={goApprovals}>
                        <span>⏳ <strong>{stats.pendingApprovals}</strong> booking(s) need your approval</span>
                        <span class="alert-action">Review Now →</span>
                    </div>
                </template>

                <!-- KPI Row -->
                <div class="mgr-kpi-row">
                    <div class="mkpi blue" onclick={goLeads}>
                        <div class="mkpi-icon">👥</div>
                        <div class="mkpi-val">{stats.totalLeads}</div>
                        <div class="mkpi-label">Total Leads</div>
                        <div class="mkpi-sub">{stats.newLeads} new this week</div>
                    </div>
                    <div class="mkpi purple" onclick={goTestDrives}>
                        <div class="mkpi-icon">🚗</div>
                        <div class="mkpi-val">{stats.totalTestDrives}</div>
                        <div class="mkpi-label">Test Drives</div>
                        <div class="mkpi-sub">{stats.scheduledTestDrives} confirmed</div>
                    </div>
                    <div class="mkpi green" onclick={goBookings}>
                        <div class="mkpi-icon">📋</div>
                        <div class="mkpi-val">{stats.totalBookings}</div>
                        <div class="mkpi-label">Bookings</div>
                        <div class="mkpi-sub">{stats.approvedBookings} approved</div>
                    </div>
                    <div class="mkpi teal" onclick={goBookings}>
                        <div class="mkpi-icon">✅</div>
                        <div class="mkpi-val">{stats.deliveredBookings}</div>
                        <div class="mkpi-label">Delivered</div>
                        <div class="mkpi-sub">vehicles this month</div>
                    </div>
                    <div class="mkpi amber" onclick={goApprovals}>
                        <div class="mkpi-icon">⏳</div>
                        <div class="mkpi-val">{stats.pendingApprovals}</div>
                        <div class="mkpi-label">Pending Approvals</div>
                        <div class="mkpi-sub">need your review</div>
                    </div>
                </div>

                <!-- Three column layout -->
                <div class="mgr-grid">

                    <!-- Recent Leads -->
                    <div class="dash-card">
                        <div class="dc-hd">
                            <div class="dc-title">Recent Leads</div>
                            <button onclick={goLeads}>View All →</button>
                        </div>
                        <template if:true={loadingLeads}><div class="dc-loading"><div class="spin"></div></div></template>
                        <template if:true={noLeads}><div class="dc-empty">No leads yet</div></template>
                        <template for:each={recentLeads} for:item="l">
                            <div key={l.Id} class="dc-row">
                                <div class="dc-av">{l.initial}</div>
                                <div class="dc-info">
                                    <div class="dc-name">{l.firstName} {l.lastName}</div>
                                    <div class="dc-meta">{l.phone} · {l.city}</div>
                                </div>
                                <span class={l.sc}>{l.Status}</span>
                            </div>
                        </template>
                    </div>

                    <!-- Recent Test Drives -->
                    <div class="dash-card">
                        <div class="dc-hd">
                            <div class="dc-title">Test Drives</div>
                            <button onclick={goTestDrives}>View All →</button>
                        </div>
                        <template if:true={loadingTDs}><div class="dc-loading"><div class="spin"></div></div></template>
                        <template if:true={noTDs}><div class="dc-empty">No test drives yet</div></template>
                        <template for:each={recentTDs} for:item="td">
                            <div key={td.Id} class="dc-row">
                                <div class="dc-av car">🚗</div>
                                <div class="dc-info">
                                    <div class="dc-name">{td.customerName}</div>
                                    <div class="dc-meta">{td.modelName} · {td.City__c}</div>
                                </div>
                                <span class={td.sc}>{td.Status__c}</span>
                            </div>
                        </template>
                    </div>

                    <!-- Recent Bookings -->
                    <div class="dash-card">
                        <div class="dc-hd">
                            <div class="dc-title">Recent Bookings</div>
                            <button onclick={goBookings}>View All →</button>
                        </div>
                        <template if:true={loadingBookings}><div class="dc-loading"><div class="spin"></div></div></template>
                        <template if:true={noBookings}><div class="dc-empty">No bookings yet</div></template>
                        <template for:each={recentBookings} for:item="b">
                            <div key={b.Id} class="dc-row">
                                <div class="dc-av book">📋</div>
                                <div class="dc-info">
                                    <div class="dc-name">{b.customerName}</div>
                                    <div class="dc-meta">{b.modelName} · ₹{b.amtFmt}</div>
                                </div>
                                <span class={b.sc}>{b.Status__c}</span>
                            </div>
                        </template>
                    </div>

                </div>

                <!-- Manager Quick Actions -->
                <div class="mgr-actions-title">Quick Actions</div>
                <div class="mgr-actions">
                    <div class="ma-card" onclick={goApprovals}>
                        <div class="ma-icon amber">⏳</div>
                        <div class="ma-label">Review Approvals</div>
                        <div class="ma-desc">Approve or reject pending bookings</div>
                    </div>
                    <div class="ma-card" onclick={goLeads}>
                        <div class="ma-icon blue">👥</div>
                        <div class="ma-label">Manage Leads</div>
                        <div class="ma-desc">Assign leads to your team</div>
                    </div>
                    <div class="ma-card" onclick={goReports}>
                        <div class="ma-icon green">📊</div>
                        <div class="ma-label">View Reports</div>
                        <div class="ma-desc">Revenue and performance metrics</div>
                    </div>
                    <div class="ma-card" onclick={goCustomers}>
                        <div class="ma-icon purple">👤</div>
                        <div class="ma-label">Customer Profiles</div>
                        <div class="ma-desc">View all customer details</div>
                    </div>
                    <div class="ma-card" onclick={goPayments}>
                        <div class="ma-icon teal">💰</div>
                        <div class="ma-label">Track Payments</div>
                        <div class="ma-desc">Outstanding and collected amounts</div>
                    </div>
                    <div class="ma-card" onclick={goModels}>
                        <div class="ma-icon red">🚙</div>
                        <div class="ma-label">Models Catalogue</div>
                        <div class="ma-desc">View all active car models</div>
                    </div>
                </div>

            </div>
        </template>

        <!-- ═══════════════════════════════════════ -->
        <!-- EXECUTIVE DASHBOARD                     -->
        <!-- ═══════════════════════════════════════ -->
        <template if:false={isManager}>

            <div class="exec-header">
                <div class="exec-header-inner">
                    <div class="exec-greeting">
                        <div class="exec-badge">👤 Sales Executive</div>
                        <h1>Good {timeOfDay}, {firstName}!</h1>
                        <p>Here's your personal performance today</p>
                    </div>
                    <div class="exec-today">
                        <div class="today-stat">
                            <div class="ts-num">{stats.scheduledTestDrives}</div>
                            <div class="ts-label">Test Drives Today</div>
                        </div>
                        <div class="today-stat">
                            <div class="ts-num">{stats.newLeads}</div>
                            <div class="ts-label">New Leads</div>
                        </div>
                        <div class="today-stat">
                            <div class="ts-num">{stats.pendingApprovals}</div>
                            <div class="ts-label">Awaiting Approval</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="exec-body">

                <!-- My Stats Strip -->
                <div class="exec-strip">
                    <div class="es-item" onclick={goLeads}>
                        <div class="es-icon">👥</div>
                        <div class="es-val">{stats.totalLeads}</div>
                        <div class="es-label">My Leads</div>
                    </div>
                    <div class="es-divider"></div>
                    <div class="es-item" onclick={goTestDrives}>
                        <div class="es-icon">🚗</div>
                        <div class="es-val">{stats.totalTestDrives}</div>
                        <div class="es-label">Test Drives</div>
                    </div>
                    <div class="es-divider"></div>
                    <div class="es-item" onclick={goBookings}>
                        <div class="es-icon">📋</div>
                        <div class="es-val">{stats.totalBookings}</div>
                        <div class="es-label">Bookings</div>
                    </div>
                    <div class="es-divider"></div>
                    <div class="es-item" onclick={goBookings}>
                        <div class="es-icon">✅</div>
                        <div class="es-val">{stats.deliveredBookings}</div>
                        <div class="es-label">Delivered</div>
                    </div>
                    <div class="es-divider"></div>
                    <div class="es-item">
                        <div class="es-icon">🎯</div>
                        <div class="es-val">{conversionRate}%</div>
                        <div class="es-label">Conversion</div>
                    </div>
                </div>

                <div class="exec-grid">

                    <!-- My Pipeline -->
                    <div class="pipeline-card">
                        <div class="pc-hd">
                            <div class="pc-title">My Lead Pipeline</div>
                            <button onclick={goLeads}>Manage →</button>
                        </div>
                        <div class="pipeline-stages">
                            <div class="ps-item">
                                <div class="ps-circle blue">{stats.newLeads}</div>
                                <div class="ps-label">New</div>
                            </div>
                            <div class="ps-arrow">→</div>
                            <div class="ps-item">
                                <div class="ps-circle amber">{contactedCount}</div>
                                <div class="ps-label">Contacted</div>
                            </div>
                            <div class="ps-arrow">→</div>
                            <div class="ps-item">
                                <div class="ps-circle purple">{qualifiedCount}</div>
                                <div class="ps-label">Qualified</div>
                            </div>
                            <div class="ps-arrow">→</div>
                            <div class="ps-item">
                                <div class="ps-circle green">{stats.totalBookings}</div>
                                <div class="ps-label">Booked</div>
                            </div>
                            <div class="ps-arrow">→</div>
                            <div class="ps-item">
                                <div class="ps-circle teal">{stats.deliveredBookings}</div>
                                <div class="ps-label">Delivered</div>
                            </div>
                        </div>
                    </div>

                    <!-- My Recent Leads -->
                    <div class="dash-card">
                        <div class="dc-hd">
                            <div class="dc-title">My Recent Leads</div>
                            <button onclick={goLeads}>View All →</button>
                        </div>
                        <template if:true={loadingLeads}><div class="dc-loading"><div class="spin"></div></div></template>
                        <template if:true={noLeads}><div class="dc-empty">No leads assigned yet</div></template>
                        <template for:each={recentLeads} for:item="l">
                            <div key={l.Id} class="dc-row">
                                <div class="dc-av">{l.initial}</div>
                                <div class="dc-info">
                                    <div class="dc-name">{l.firstName} {l.lastName}</div>
                                    <div class="dc-meta">{l.modelName} · {l.city}</div>
                                </div>
                                <span class={l.sc}>{l.Status}</span>
                            </div>
                        </template>
                    </div>

                    <!-- Today's Test Drives -->
                    <div class="dash-card">
                        <div class="dc-hd">
                            <div class="dc-title">Today's Test Drives</div>
                            <button onclick={goTestDrives}>View All →</button>
                        </div>
                        <template if:true={loadingTDs}><div class="dc-loading"><div class="spin"></div></div></template>
                        <template if:true={noTDs}><div class="dc-empty">No test drives today</div></template>
                        <template for:each={recentTDs} for:item="td">
                            <div key={td.Id} class="dc-row">
                                <div class="dc-av car">🚗</div>
                                <div class="dc-info">
                                    <div class="dc-name">{td.customerName}</div>
                                    <div class="dc-meta">{td.modelName} · {td.dateFmt}</div>
                                </div>
                                <span class={td.sc}>{td.Status__c}</span>
                            </div>
                        </template>
                    </div>

                </div>

                <!-- Executive Quick Actions -->
                <div class="exec-actions">
                    <div class="ea-card blue" onclick={goLeads}>
                        <div class="ea-icon">👥</div>
                        <div>
                            <div class="ea-title">Manage My Leads</div>
                            <div class="ea-desc">Update status, convert leads</div>
                        </div>
                        <span class="ea-arrow">→</span>
                    </div>
                    <div class="ea-card purple" onclick={goTestDrives}>
                        <div class="ea-icon">🚗</div>
                        <div>
                            <div class="ea-title">Test Drive Schedule</div>
                            <div class="ea-desc">Confirm and complete test drives</div>
                        </div>
                        <span class="ea-arrow">→</span>
                    </div>
                    <div class="ea-card green" onclick={goBookings}>
                        <div class="ea-icon">📋</div>
                        <div>
                            <div class="ea-title">My Bookings</div>
                            <div class="ea-desc">Track booking payments</div>
                        </div>
                        <span class="ea-arrow">→</span>
                    </div>
                    <div class="ea-card amber" onclick={goCustomers}>
                        <div class="ea-icon">👤</div>
                        <div>
                            <div class="ea-title">My Customers</div>
                            <div class="ea-desc">View customer profiles</div>
                        </div>
                        <span class="ea-arrow">→</span>
                    </div>
                </div>

            </div>
        </template>

    </div>
</template>
