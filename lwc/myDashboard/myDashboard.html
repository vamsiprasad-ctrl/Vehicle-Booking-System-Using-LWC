<template>
    <div class="dashboard-page">
        <div class="dash-header">
            <div class="header-inner">
                <div class="greeting">
                    <h1 class="greeting-text">Welcome back, {userName}!</h1>
                    <p class="greeting-sub">Here's an overview of your Tata Motors journey</p>
                </div>
                <button class="btn-test-drive" onclick={goTestDrive}>
                    <i class="ti ti-calendar-plus" aria-hidden="true"></i> Book Test Drive
                </button>
            </div>
        </div>

        <div class="dash-body">
            <div class="body-inner">

                <!-- KPI Cards -->
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon blue"><i class="ti ti-file-invoice" aria-hidden="true"></i></div>
                        <div class="kpi-body">
                            <div class="kpi-num">{kpis.totalBookings}</div>
                            <div class="kpi-label">Total Bookings</div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon green"><i class="ti ti-circle-check" aria-hidden="true"></i></div>
                        <div class="kpi-body">
                            <div class="kpi-num">{kpis.approvedBookings}</div>
                            <div class="kpi-label">Approved Bookings</div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon purple"><i class="ti ti-steering-wheel" aria-hidden="true"></i></div>
                        <div class="kpi-body">
                            <div class="kpi-num">{kpis.totalTestDrives}</div>
                            <div class="kpi-label">Test Drives</div>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon amber"><i class="ti ti-credit-card" aria-hidden="true"></i></div>
                        <div class="kpi-body">
                            <div class="kpi-num">{kpis.pendingPayments}</div>
                            <div class="kpi-label">Pending Payments</div>
                        </div>
                    </div>
                </div>

                <!-- Recent activity -->
                <div class="activity-grid">

                    <!-- Recent bookings -->
                    <div class="activity-card">
                        <div class="activity-header">
                            <h2 class="activity-title">
                                <i class="ti ti-file-invoice" aria-hidden="true"></i> Recent Bookings
                            </h2>
                            <button class="btn-view-all" onclick={goBookings}>View All</button>
                        </div>

                        <template if:true={loadingBookings}>
                            <div class="loading-row">
                                <div class="spinner"></div> Loading...
                            </div>
                        </template>

                        <template if:true={noBookings}>
                            <div class="empty-state">
                                <i class="ti ti-file-off" aria-hidden="true"></i>
                                <p>No bookings yet</p>
                            </div>
                        </template>

                        <template for:each={recentBookings} for:item="b">
                            <div key={b.Id} class="activity-row">
                                <div class="ar-left">
                                    <div class="ar-title">{b.modelName} — {b.variantName}</div>
                                    <div class="ar-sub">#{b.Booking_Number__c} · {b.Booking_Date__c}</div>
                                </div>
                                <div class={b.statusClass}>{b.Status__c}</div>
                            </div>
                        </template>
                    </div>

                    <!-- Recent test drives -->
                    <div class="activity-card">
                        <div class="activity-header">
                            <h2 class="activity-title">
                                <i class="ti ti-steering-wheel" aria-hidden="true"></i> Recent Test Drives
                            </h2>
                            <button class="btn-view-all" onclick={goTestDrives}>View All</button>
                        </div>

                        <template if:true={loadingTestDrives}>
                            <div class="loading-row">
                                <div class="spinner"></div> Loading...
                            </div>
                        </template>

                        <template if:true={noTestDrives}>
                            <div class="empty-state">
                                <i class="ti ti-car-off" aria-hidden="true"></i>
                                <p>No test drives yet</p>
                            </div>
                        </template>

                        <template for:each={recentTestDrives} for:item="td">
                            <div key={td.Id} class="activity-row">
                                <div class="ar-left">
                                    <div class="ar-title">{td.modelName} — {td.variantName}</div>
                                    <div class="ar-sub">{td.Preferred_Date_Time__c}</div>
                                </div>
                                <div class={td.statusClass}>{td.Status__c}</div>
                            </div>
                        </template>
                    </div>

                </div>

                <!-- Quick links -->
                <div class="quick-links">
                    <div class="ql-card" onclick={goBookings}>
                        <i class="ti ti-file-invoice" aria-hidden="true"></i>
                        <span>My Bookings</span>
                        <i class="ti ti-arrow-right ql-arrow" aria-hidden="true"></i>
                    </div>
                    <div class="ql-card" onclick={goTestDrives}>
                        <i class="ti ti-steering-wheel" aria-hidden="true"></i>
                        <span>My Test Drives</span>
                        <i class="ti ti-arrow-right ql-arrow" aria-hidden="true"></i>
                    </div>
                    <div class="ql-card" onclick={goProfile}>
                        <i class="ti ti-user" aria-hidden="true"></i>
                        <span>My Profile</span>
                        <i class="ti ti-arrow-right ql-arrow" aria-hidden="true"></i>
                    </div>
                    <div class="ql-card" onclick={goModels}>
                        <i class="ti ti-car" aria-hidden="true"></i>
                        <span>Browse Models</span>
                        <i class="ti ti-arrow-right ql-arrow" aria-hidden="true"></i>
                    </div>
                </div>

            </div>
        </div>
    </div>
</template>
