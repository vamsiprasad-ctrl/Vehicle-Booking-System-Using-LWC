<template>
    <div class="kpi-grid">
        <template for:each={cards} for:item="card">
            <div key={card.id} class="kpi-card">
                <div class={card.iconClass}>{card.icon}</div>
                <div class="kpi-body">
                    <div class="kpi-num">{card.value}</div>
                    <div class="kpi-label">{card.label}</div>
                </div>
                <template if:true={card.sub}>
                    <div class="kpi-sub">{card.sub}</div>
                </template>
            </div>
        </template>
    </div>
</template>
