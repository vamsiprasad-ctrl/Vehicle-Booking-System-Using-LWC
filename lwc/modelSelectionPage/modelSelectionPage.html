<template>
    <div class="model-page">

        <!-- Page Header -->
        <div class="page-header">
            <div class="header-content">
                <h1 class="page-title">Choose Your Model</h1>
                <p class="page-subtitle">
                    Select a car model to see available
                    variants and book your test drive
                </p>
            </div>
            <!-- Progress Indicator -->
            <div class="progress-bar">
                <div class="step step-active">
                    <div class="step-circle">1</div>
                    <span>Select Model</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">2</div>
                    <span>Select Variant</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">3</div>
                    <span>Your Details</span>
                </div>
                <div class="step-line"></div>
                <div class="step">
                    <div class="step-circle">4</div>
                    <span>Confirm</span>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Loading models...</p>
            </div>
        </template>

        <!-- Models Grid -->
        <div class="models-grid">
            <template for:each={models} for:item="model">
                <div key={model.Id}
                     class="model-card"
                     onclick={handleModelClick}
                     data-id={model.Id}
                     data-name={model.Name}>

                    <!-- Model Image -->
                    <div class="model-image-container">
                        <template if:true={model.Image_URL__c}>
                            <img src={model.Image_URL__c}
                                 alt={model.Name}
                                 class="model-image"
                                 onerror={handleImageError}/>
                        </template>
                        <template if:false={model.Image_URL__c}>
                            <div class="model-image-placeholder">
                                🚗
                            </div>
                        </template>
                        <div class="model-overlay">
                            <span class="select-text">
                                Select This Model →
                            </span>
                        </div>
                    </div>

                    <!-- Model Info -->
                    <div class="model-info">
                        <h3 class="model-name">{model.Name}</h3>
                        <p class="model-desc">
                            {model.Description__c}
                        </p>
                        <button class="btn-select-model"
                                data-id={model.Id}
                                data-name={model.Name}
                                onclick={handleModelClick}>
                            View Variants
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
