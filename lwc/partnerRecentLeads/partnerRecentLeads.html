<template>
    <div class="activity-card">
        <div class="card-header">
            <h3>Recent Leads</h3>
            <button onclick={goLeads}>View All</button>
        </div>
        <template if:true={loading}><div class="loading-row"><div class="spinner"></div> Loading...</div></template>
        <template if:true={empty}><div class="empty-state">👥 No leads yet</div></template>
        <template for:each={leads} for:item="lead">
            <div key={lead.Id} class="row-item">
                <div class="row-left">
                    <div class="row-title">{lead.FirstName} {lead.LastName}</div>
                    <div class="row-sub">{lead.Phone} · {lead.City}</div>
                </div>
                <span class={lead.statusClass}>{lead.Status}</span>
            </div>
        </template>
    </div>
</template>
