<template>
    <div class="page">
        <template if:false={isManager}>
            <div class="access-denied">
                <div class="ad-icon">🔒</div>
                <h2>Access Restricted</h2>
                <p>This page is only accessible to Sales Managers.</p>
                <button class="btn-back" onclick={goDashboard}>← Back to Dashboard</button>
            </div>
        </template>

        <template if:true={isManager}>
            <div class="page-header">
                <div class="hi">
                    <div>
                        <h1>Pending Approvals</h1>
                        <p>Review and approve or reject customer bookings</p>
                    </div>
                    <template if:true={hasPending}>
                        <div class="pending-pill">{bookings.length} awaiting your approval</div>
                    </template>
                </div>
            </div>

            <div class="page-body">
                <template if:true={loading}>
                    <div class="loading"><div class="spin"></div> Loading pending approvals...</div>
                </template>
                <template if:true={empty}>
                    <div class="all-clear">
                        <div class="ac-icon">✅</div>
                        <h3>All caught up!</h3>
                        <p>No bookings are pending approval right now.</p>
                    </div>
                </template>
                <template for:each={bookings} for:item="b">
                    <div key={b.Id} class="approval-card">
                        <div class="ac-left">
                            <div class="ac-av">{b.initial}</div>
                            <div class="ac-info">
                                <div class="ac-name">{b.customerName}</div>
                                <div class="ac-meta">📞 {b.customerPhone}</div>
                                <div class="ac-meta">✉️ {b.customerEmail}</div>
                                <div class="ac-meta">Submitted by: {b.ownerName}</div>
                            </div>
                        </div>
                        <div class="ac-middle">
                            <div class="ac-vehicle">{b.modelName}</div>
                            <div class="ac-variant">{b.variantName}</div>
                            <div class="ac-amount">₹{b.totalFmt}</div>
                            <span class="badge amber">Pending</span>
                        </div>
                        <div class="ac-dates">
                            <div class="acd-label">Booking Date</div>
                            <div class="acd-val">{b.Booking_Date__c}</div>
                            <div class="acd-label">Expected Delivery</div>
                            <div class="acd-val">{b.Expected_Delivery_Date__c}</div>
                            <div class="acd-label">Booking #</div>
                            <div class="acd-val mono">{b.Booking_Number__c}</div>
                        </div>
                        <div class="ac-actions">
                            <button class="btn-approve" data-id={b.Id} onclick={approveBooking}>✅ Approve</button>
                            <div class="reject-group">
                                <input type="text" class="reject-input"
                                       placeholder="Rejection reason (required)..."
                                       data-id={b.Id}
                                       onchange={handleReason}/>
                                <button class="btn-reject" data-id={b.Id} onclick={rejectBooking}>❌ Reject</button>
                            </div>
                        </div>
                        <template if:true={b.successMsg}>
                            <div class="card-msg success">{b.successMsg}</div>
                        </template>
                        <template if:true={b.errorMsg}>
                            <div class="card-msg error">{b.errorMsg}</div>
                        </template>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
