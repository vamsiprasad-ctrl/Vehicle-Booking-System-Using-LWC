<template>
    <div class="table-card">
        <template if:true={loading}><div class="loading-wrap"><div class="spinner"></div> Loading...</div></template>
        <template if:true={empty}><div class="empty-state">💳 No payments found</div></template>
        <template if:false={loading}>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Model</th>
                        <th>Amount</th>
                        <th>Method</th>
                        <th>Date</th>
                        <th>Booking #</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={payments} for:item="p">
                        <tr key={p.Id} class="table-row">
                            <td>{p.Booking__r.Contact__r.FirstName} {p.Booking__r.Contact__r.LastName}</td>
                            <td>{p.Booking__r.Model__r.Name}</td>
                            <td class="amount-cell">₹{p.amountFormatted}</td>
                            <td><span class="method-tag">{p.Payment_Method__c}</span></td>
                            <td>{p.Payment_Date__c}</td>
                            <td class="mono">{p.Booking__r.Booking_Number__c}</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
    </div>
</template>
