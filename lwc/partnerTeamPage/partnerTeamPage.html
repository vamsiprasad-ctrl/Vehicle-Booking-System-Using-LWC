<template>
    <div class="team-page">
        <c-partner-nav></c-partner-nav>
        <div class="page-header">
            <div class="page-header-inner">
                <div>
                    <p class="page-eyebrow">Manager View</p>
                    <h1 class="page-title">Team Performance</h1>
                    <p class="page-sub">Monitor your sales team's activity and results</p>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="page-inner">

                <!-- Access Denied -->
                <template if:false={isManager}>
                    <div class="slds-card empty-card">
                        <div class="empty-state-big">
                            <lightning-icon icon-name="utility:lock" size="large"></lightning-icon>
                            <h3>Access Restricted</h3>
                            <p>This page is only available to Sales Managers</p>
                        </div>
                    </div>
                </template>

                <template if:true={isManager}>
                    <template if:true={isLoading}>
                        <div class="loading-wrap">
                            <lightning-spinner alternative-text="Loading" size="medium">
                            </lightning-spinner>
                        </div>
                    </template>

                    <template if:false={isLoading}>

                        <!-- Team KPI Summary -->
                        <div class="kpi-grid" style="margin-bottom:28px">
                            <div class="kpi-card kpi-blue">
                                <div class="kpi-icon">
                                    <lightning-icon icon-name="standard:lead"
                                        size="medium"></lightning-icon>
                                </div>
                                <div class="kpi-content">
                                    <div class="kpi-value">{teamKpis.totalLeads}</div>
                                    <div class="kpi-label">Total Team Leads</div>
                                </div>
                            </div>
                            <div class="kpi-card kpi-green">
                                <div class="kpi-icon">
                                    <lightning-icon icon-name="standard:event"
                                        size="medium"></lightning-icon>
                                </div>
                                <div class="kpi-content">
                                    <div class="kpi-value">{teamKpis.totalTestDrives}</div>
                                    <div class="kpi-label">Total Test Drives</div>
                                </div>
                            </div>
                            <div class="kpi-card kpi-purple">
                                <div class="kpi-icon">
                                    <lightning-icon icon-name="standard:orders"
                                        size="medium"></lightning-icon>
                                </div>
                                <div class="kpi-content">
                                    <div class="kpi-value">{teamKpis.totalBookings}</div>
                                    <div class="kpi-label">Total Bookings</div>
                                </div>
                            </div>
                            <div class="kpi-card kpi-amber">
                                <div class="kpi-icon">
                                    <lightning-icon icon-name="standard:approval"
                                        size="medium"></lightning-icon>
                                </div>
                                <div class="kpi-content">
                                    <div class="kpi-value">{teamKpis.pendingApprovals}</div>
                                    <div class="kpi-label">Pending Approvals</div>
                                </div>
                            </div>
                        </div>

                        <!-- Team Members Grid -->
                        <template if:true={noMembers}>
                            <div class="slds-card empty-card">
                                <div class="empty-state-big">
                                    <lightning-icon icon-name="standard:people" size="large">
                                    </lightning-icon>
                                    <h3>No team members found</h3>
                                    <p>No Sales Executives are assigned to your team</p>
                                </div>
                            </div>
                        </template>

                        <template if:false={noMembers}>
                            <div class="section-header-row">
                                <h2 class="section-heading">Sales Executives</h2>
                                <span class="result-count">{members.length} members</span>
                            </div>
                            <div class="team-grid">
                                <template for:each={members} for:item="member">
                                    <div key={member.id} class="team-card">
                                        <div class="team-avatar">{member.initial}</div>
                                        <div class="team-name">{member.name}</div>
                                        <div class="team-role">Sales Executive</div>
                                        <div class="team-stats">
                                            <div class="team-stat">
                                                <div class="team-stat-num">
                                                    {member.leadCount}
                                                </div>
                                                <div class="team-stat-label">Leads</div>
                                            </div>
                                            <div class="team-stat">
                                                <div class="team-stat-num">
                                                    {member.tdCount}
                                                </div>
                                                <div class="team-stat-label">Test Drives</div>
                                            </div>
                                            <div class="team-stat">
                                                <div class="team-stat-num">
                                                    {member.bookingCount}
                                                </div>
                                                <div class="team-stat-label">Bookings</div>
                                            </div>
                                        </div>
                                        <div class="team-card-footer">
                                            <button class="slds-button
                                                           slds-button_icon
                                                           slds-button_icon-border"
                                                    title="Email"
                                                    data-email={member.email}
                                                    onclick={handleEmail}>
                                                <lightning-icon
                                                    icon-name="utility:email"
                                                    size="xx-small">
                                                </lightning-icon>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Leads Table -->
                            <div class="section-header-row"
                                 style="margin-top:32px">
                                <h2 class="section-heading">All Team Leads</h2>
                                <span class="result-count">
                                    {allLeads.length} leads
                                </span>
                            </div>
                            <div class="slds-card" style="overflow:auto">
                                <table class="slds-table
                                              slds-table_cell-buffer
                                              slds-table_bordered
                                              slds-table_striped">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th>Name</th>
                                            <th>Phone</th>
                                            <th>Status</th>
                                            <th>Source</th>
                                            <th>Assigned To</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={allLeads}
                                                  for:item="lead">
                                            <tr key={lead.Id}>
                                                <td>
                                                    <div class="lead-name-cell">
                                                        <div class="list-avatar">
                                                            {lead.firstInitial}
                                                        </div>
                                                        <div class="cell-primary">
                                                            {lead.FirstName}
                                                            {lead.LastName}
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="cell-sub">
                                                    {lead.Phone}
                                                </td>
                                                <td>
                                                    <span class={lead.statusCls}>
                                                        {lead.Status}
                                                    </span>
                                                </td>
                                                <td class="cell-sub">
                                                    {lead.LeadSource}
                                                </td>
                                                <td class="cell-primary">
                                                    {lead.Owner.Name}
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                    </template>
                </template>
            </div>
        </div>
        <c-partner-footer></c-partner-footer>
    </div>
</template>
