<template>
    <section class="section">
        <div class="sec-top">
            <div>
                <div class="sec-eye">Our Lineup</div>
                <div class="sec-h">Featured Models</div>
                <div class="sec-sub">From bold EVs to rugged SUVs — find your perfect match.</div>
            </div>
            <button class="btn-all" onclick={handleViewAll}>View All Models</button>
        </div>
        <template if:true={isLoading}>
            <div class="loading">Loading models...</div>
        </template>
        <template if:false={isLoading}>
            <div class="grid3">
                <template for:each={models} for:item="car">
                    <div key={car.id}>
                        <c-model-card car={car} onexplore={handleExplore} ontestdrive={handleTestDrive}></c-model-card>
                    </div>
                </template>
            </div>
        </template>
    </section>
</template>
