<template>
    <div class="modal-overlay" onclick={handleOverlayClick}>
        <div class="modal-box">
            <div class="modal-header">
                <h3>Test Drive Actions</h3>
                <button class="close-btn" onclick={handleClose}>✕</button>
            </div>
            <div class="modal-body">
                <div class="td-info">
                    <div><strong>{testDrive.Lead__r.FirstName} {testDrive.Lead__r.LastName}</strong></div>
                    <div>{testDrive.Model__r.Name} — {testDrive.Variant__r.Name}</div>
                    <div class="td-date">{dateFormatted}</div>
                    <span class={statusClass}>{testDrive.Status__c}</span>
                </div>

                <template if:true={canConfirm}>
                    <button class="btn-action confirm" onclick={confirmTD}>✅ Confirm Test Drive</button>
                </template>

                <template if:true={canComplete}>
                    <div class="notes-group">
                        <label>Notes (required to complete)</label>
                        <textarea class="notes-input" value={notes} onchange={handleNotes}
                            placeholder="Add test drive notes..."></textarea>
                    </div>
                    <button class="btn-action complete" onclick={completeTD}>✔ Mark as Completed</button>
                </template>

                <template if:true={canCancel}>
                    <button class="btn-action cancel" onclick={cancelTD}>✖ Cancel Test Drive</button>
                </template>

                <template if:true={successMsg}>
                    <div class="success-msg">{successMsg}</div>
                </template>
                <template if:true={errorMsg}>
                    <div class="error-msg">{errorMsg}</div>
                </template>
            </div>
        </div>
    </div>
</template>
