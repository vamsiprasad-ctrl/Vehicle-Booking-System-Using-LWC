<template>
    <div class="page-wrap">
        <div class="page-header">
            <div class="header-inner">
                <div>
                    <h1>Leads</h1>
                    <p>Manage and track all your customer leads</p>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="body-inner">
                <c-partner-leads-filter
                    onfilterchange={handleFilter}>
                </c-partner-leads-filter>

                <div class="content-layout">
                    <c-partner-leads-table
                        leads={leads}
                        loading={loading}
                        onleadselect={handleLeadSelect}>
                    </c-partner-leads-table>

                    <template if:true={selectedLead}>
                        <c-partner-lead-detail
                            lead={selectedLead}
                            onclose={closeDetail}
                            onrefresh={refreshLeads}>
                        </c-partner-lead-detail>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
