<template>
    <div class="vlist">
        <div class="vl-header">
            <div class="vl-title">Choose Your Variant</div>
            <div class="vl-sub">Pick the perfect configuration for you</div>
        </div>
        <div class="vl-grid">
            <template for:each={variantsWithState} for:item="v">
                <div key={v.n}>
                    <c-variant-card variant={v} selected={v.selected} onselect={handleSelect} onbook={handleBook} onemi={handleEMI}></c-variant-card>
                </div>
            </template>
        </div>
    </div>
</template>
