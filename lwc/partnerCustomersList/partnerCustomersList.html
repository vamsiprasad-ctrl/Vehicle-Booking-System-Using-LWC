<template>
    <div class="table-card">
        <template if:true={loading}><div class="loading-wrap"><div class="spinner"></div> Loading...</div></template>
        <template if:true={empty}><div class="empty-state">👤 No customers found</div></template>
        <template if:false={loading}>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th>Account</th>
                        <th>Since</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={customers} for:item="c">
                        <tr key={c.Id} class="table-row">
                            <td>
                                <div class="name-cell">
                                    <div class="name-avatar">{c.initial}</div>
                                    <div>
                                        <div class="cell-title">{c.FirstName} {c.LastName}</div>
                                        <div class="cell-sub">{c.Email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>{c.Phone}</td>
                            <td>{c.MailingCity}</td>
                            <td>{c.accountName}</td>
                            <td>{c.createdDate}</td>
                            <td>
                                <button class="btn-view" data-id={c.Id} onclick={selectCustomer}>
                                    View Profile
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
    </div>
</template>
