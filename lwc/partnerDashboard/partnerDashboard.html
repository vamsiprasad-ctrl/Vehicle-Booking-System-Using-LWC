<template>
    <div class="dashboard-page">
        <div class="page-header">
            <div class="header-inner">
                <div class="greeting">
                    <h1>Welcome back, {userName}! 👋</h1>
                    <p>Here is your {roleLabel} overview for today</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" onclick={goLeads}>+ New Lead</button>
                </div>
            </div>
        </div>

        <div class="page-body">
            <div class="body-inner">

                <!-- KPI Cards -->
                <template if:false={loading}>
                    <c-partner-kpi-cards
                        stats={stats}
                        is-manager={isManager}>
                    </c-partner-kpi-cards>
                </template>

                <template if:true={loading}>
                    <div class="loading-row">
                        <div class="spinner"></div> Loading stats...
                    </div>
                </template>

                <!-- Pending Approvals Alert (Manager only) -->
                <template if:true={showApprovalAlert}>
                    <div class="alert-banner" onclick={goApprovals}>
                        <span>⏳ {pendingCount} booking(s) awaiting your approval</span>
                        <span class="alert-link">Review Now →</span>
                    </div>
                </template>

                <!-- Recent Activity Grid -->
                <div class="activity-grid">
                    <c-partner-recent-leads></c-partner-recent-leads>
                    <c-partner-recent-test-drives></c-partner-recent-test-drives>
                </div>

                <div class="activity-grid">
                    <c-partner-recent-bookings></c-partner-recent-bookings>
                </div>

            </div>
        </div>
    </div>
</template>
