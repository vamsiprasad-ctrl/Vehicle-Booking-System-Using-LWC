<template>
    <nav class="nav">
        <div class="nav-logo" onclick={goHome}>
            <div class="nlogo">TM</div>
            <span class="ntext">Tata Motors</span>
        </div>

        <div class="nav-links">
            <button class={homeClass} onclick={goHome}>Home</button>
            <button class={modelsClass} onclick={goModels}>Models</button>
            <button class={testDriveClass} onclick={goTestDrive}>Test Drive</button>
            <button class={aboutClass} onclick={goAbout}>About</button>
            <template if:true={isLoggedIn}>
                <button class={dashClass} onclick={goDashboard}>Dashboard</button>
                <button class={bookingsClass} onclick={goBookings}>My Bookings</button>
                <button class={testDrivesClass} onclick={goTestDrives}>Test Drives</button>
            </template>
        </div>

        <div class="nav-right">
            <template if:true={isLoggedIn}>
                <div class="user-menu" onclick={toggleUserMenu}>
                    <div class="user-avatar">{userInitial}</div>
                    <span class="user-name">{userFirstName}</span>
                    <span class="chevron">&#8964;</span>
                    <template if:true={showUserMenu}>
                        <div class="dropdown">
                            <a onclick={goDashboard} class="drop-item">&#128203; Dashboard</a>
                            <a onclick={goBookings} class="drop-item">&#128666; My Bookings</a>
                            <a onclick={goTestDrives} class="drop-item">&#128664; My Test Drives</a>
                            <a onclick={goProfile} class="drop-item">&#128100; My Profile</a>
                            <div class="drop-divider"></div>
                            <a onclick={handleLogout} class="drop-item logout">&#128682; Logout</a>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={isLoggedIn}>
                <button class="btn-ng" onclick={handleLogin}>Login</button>
                <button class="btn-ns" onclick={goTestDrive}>Book Now</button>
            </template>

            <button class="hamburger" onclick={toggleMobileMenu} aria-label="Menu">
                <span class={hamLine1}></span>
                <span class={hamLine2}></span>
                <span class={hamLine3}></span>
            </button>
        </div>
    </nav>

    <template if:true={showMobileMenu}>
        <div class="mobile-menu">
            <a onclick={goHome} class="mob-link">Home</a>
            <a onclick={goModels} class="mob-link">Models</a>
            <a onclick={goTestDrive} class="mob-link">Test Drive</a>
            <a onclick={goAbout} class="mob-link">About</a>
            <template if:true={isLoggedIn}>
                <a onclick={goDashboard} class="mob-link">Dashboard</a>
                <a onclick={goBookings} class="mob-link">My Bookings</a>
                <a onclick={goTestDrives} class="mob-link">My Test Drives</a>
                <a onclick={goProfile} class="mob-link">My Profile</a>
                <a onclick={handleLogout} class="mob-link mob-logout">Logout</a>
            </template>
            <template if:false={isLoggedIn}>
                <a onclick={handleLogin} class="mob-link mob-login">Login</a>
            </template>
        </div>
    </template>
</template>
