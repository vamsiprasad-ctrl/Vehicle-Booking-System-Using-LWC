<template>
    <div class="slds-m-around_medium">
        <article class="slds-card">
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center
                              slds-has-flexi-truncate">
                    <div class="slds-media__figure">
                        <lightning-icon
                            icon-name="standard:event"
                            size="small">
                        </lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">
                            Book a Test Drive
                        </h2>
                    </div>
                </header>
            </div>

            <div class="slds-card__body slds-card__body_inner">
                <template if:true={submitted}>
                    <div class="slds-notify slds-notify_toast
                                slds-theme_success" role="status">
                        <span class="slds-assistive-text">
                            Success
                        </span>
                        <div class="slds-notify__content">
                            <h2 class="slds-text-heading_small">
                                ✅ Request submitted successfully!
                            </h2>
                            <p>Our team will contact you
                               within 24 hours.</p>
                        </div>
                    </div>
                    <div class="slds-m-top_medium">
                        <lightning-button
                            label="Submit Another Request"
                            variant="neutral"
                            onclick={handleReset}>
                        </lightning-button>
                    </div>
                </template>

                <template if:false={submitted}>
                    <div class="slds-form slds-form_stacked">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    label="First Name"
                                    required
                                    data-field="firstName"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    label="Last Name"
                                    required
                                    data-field="lastName"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters
                                    slds-m-top_small">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    type="email"
                                    label="Email"
                                    required
                                    data-field="email"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    type="tel"
                                    label="Phone"
                                    required
                                    placeholder="10 digit number"
                                    data-field="phone"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters
                                    slds-m-top_small">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    label="City"
                                    data-field="city"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    type="datetime-local"
                                    label="Preferred Date & Time"
                                    required
                                    data-field="preferredDateTime"
                                    onchange={handleChange}>
                                </lightning-input>
                            </div>
                        </div>

                        <template if:true={error}>
                            <div class="slds-notify
                                        slds-notify_alert
                                        slds-alert_error
                                        slds-m-top_small"
                                role="alert">
                                <span>{error}</span>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <template if:false={submitted}>
                <div class="slds-card__footer">
                    <lightning-button
                        label="Submit Request"
                        variant="brand"
                        disabled={isSubmitting}
                        onclick={handleSubmit}>
                    </lightning-button>
                </div>
            </template>
        </article>
    </div>
</template>
