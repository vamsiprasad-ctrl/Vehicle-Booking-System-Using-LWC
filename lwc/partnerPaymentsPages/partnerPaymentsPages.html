<template>
    <div class="page">
        <div class="page-header">
            <div class="hi">
                <div>
                    <h1>Payments</h1>
                    <p>Track collected payments and outstanding balances</p>
                </div>
            </div>
        </div>
        <div class="page-body">

            <!-- Summary Cards -->
            <div class="sum-grid">
                <div class="sum-card g">
                    <div class="sum-icon">💰</div>
                    <div class="sum-val">₹{totalCollectedFmt}</div>
                    <div class="sum-lbl">Total Collected</div>
                </div>
                <div class="sum-card b">
                    <div class="sum-icon">📅</div>
                    <div class="sum-val">₹{thisMonthFmt}</div>
                    <div class="sum-lbl">This Month</div>
                </div>
                <div class="sum-card a">
                    <div class="sum-icon">⏳</div>
                    <div class="sum-val">₹{outstandingFmt}</div>
                    <div class="sum-lbl">Outstanding</div>
                </div>
            </div>

            <!-- Payment History -->
            <div class="sec-hd">
                <h2>Payment History</h2>
                <select class="filter-sel" onchange={handleMethod}>
                    <option value="all">All Methods</option>
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Loan">Loan</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                </select>
            </div>
            <div class="table-wrap">
                <template if:true={loading}><div class="loading"><div class="spin"></div> Loading...</div></template>
                <template if:true={emptyP}><div class="empty">💳 No payments found</div></template>
                <template if:false={loading}>
                    <table>
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Model</th>
                                <th>Amount</th>
                                <th>Method</th>
                                <th>Date</th>
                                <th>Booking #</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={payments} for:item="p">
                                <tr key={p.Id} class="trow">
                                    <td>{p.customerName}</td>
                                    <td>{p.modelName}</td>
                                    <td><span class="amt green">₹{p.amtFmt}</span></td>
                                    <td><span class="method-tag">{p.Payment_Method__c}</span></td>
                                    <td>{p.Payment_Date__c}</td>
                                    <td class="mono">{p.bookingNumber}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>

            <!-- Outstanding -->
            <div class="sec-hd"><h2>Outstanding Balances</h2></div>
            <div class="table-wrap">
                <template if:true={loadingO}><div class="loading"><div class="spin"></div> Loading...</div></template>
                <template if:true={emptyO}><div class="empty">✅ No outstanding balances</div></template>
                <template if:false={loadingO}>
                    <table>
                        <thead>
                            <tr>
                                <th>Customer</th>
                                <th>Model</th>
                                <th>Total</th>
                                <th>Paid</th>
                                <th>Outstanding</th>
                                <th>Delivery Date</th>
                                <th>Exec</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={outstanding} for:item="b">
                                <tr key={b.Id} class="trow">
                                    <td>
                                        <div class="td-title">{b.customerName}</div>
                                        <div class="td-sub">{b.customerPhone}</div>
                                    </td>
                                    <td>{b.modelName}</td>
                                    <td>₹{b.totalFmt}</td>
                                    <td><span class="amt green">₹{b.paidFmt}</span></td>
                                    <td><span class="amt amber">₹{b.remainFmt}</span></td>
                                    <td>{b.Expected_Delivery_Date__c}</td>
                                    <td>{b.ownerName}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>

        </div>
    </div>
</template>
