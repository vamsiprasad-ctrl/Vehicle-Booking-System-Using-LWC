<template>
    <div class="slds-m-around_medium">
        <template if:true={model}>
            <div class="slds-page-header slds-m-bottom_medium">
                <div class="slds-page-header__row">
                    <div class="slds-page-header__col-title">
                        <div class="slds-media">
                            <div class="slds-media__figure">
                                <lightning-icon
                                    icon-name="standard:product"
                                    size="medium">
                                </lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <h1 class="slds-page-header__title">
                                    {model.Name}
                                </h1>
                                <p class="slds-text-body_small">
                                    {model.Description__c}
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="slds-page-header__col-actions">
                        <lightning-button
                            label="← Back to Models"
                            variant="neutral"
                            onclick={handleBack}>
                        </lightning-button>
                    </div>
                </div>
            </div>

            <h2 class="slds-text-heading_medium slds-m-bottom_medium">
                Available Variants
            </h2>

            <div class="slds-grid slds-wrap slds-gutters">
                <template for:each={variants} for:item="variant">
                    <div key={variant.Id}
                        class="slds-col slds-size_1-of-1
                               slds-medium-size_1-of-2
                               slds-large-size_1-of-3
                               slds-m-bottom_medium">
                        <article class="slds-card">
                            <div class="slds-card__header slds-grid">
                                <header class="slds-media
                                              slds-media_center
                                              slds-has-flexi-truncate">
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            {variant.Name}
                                        </h2>
                                    </div>
                                </header>
                            </div>
                            <div class="slds-card__body
                                        slds-card__body_inner">
                                <dl class="slds-dl_horizontal">
                                    <dt class="slds-dl_horizontal__label
                                               slds-text-color_weak">
                                        Price
                                    </dt>
                                    <dd class="slds-dl_horizontal__detail
                                               slds-text-title_bold">
                                        ₹{variant.Price__c}
                                    </dd>
                                    <dt class="slds-dl_horizontal__label
                                               slds-text-color_weak">
                                        Fuel Type
                                    </dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        {variant.Fuel_Type__c}
                                    </dd>
                                    <dt class="slds-dl_horizontal__label
                                               slds-text-color_weak">
                                        Transmission
                                    </dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        {variant.Transmission__c}
                                    </dd>
                                    <dt class="slds-dl_horizontal__label
                                               slds-text-color_weak">
                                        Colors
                                    </dt>
                                    <dd class="slds-dl_horizontal__detail">
                                        {variant.Color_Options__c}
                                    </dd>
                                </dl>
                            </div>
                            <div class="slds-card__footer">
                                <lightning-button
                                    label="Book Test Drive"
                                    variant="brand"
                                    data-variantid={variant.Id}
                                    data-modelid={model.Id}
                                    onclick={handleTestDrive}>
                                </lightning-button>
                            </div>
                        </article>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
