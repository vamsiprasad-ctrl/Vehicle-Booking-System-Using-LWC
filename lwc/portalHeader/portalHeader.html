<template>
    <header class="portal-header">
        <div class="header-container">

            <!-- Logo Section -->
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40"
                         fill="none"
                         xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="20" fill="#0076BE"/>
                        <text x="50%" y="55%"
                              dominant-baseline="middle"
                              text-anchor="middle"
                              fill="white"
                              font-size="14"
                              font-weight="bold"
                              font-family="Arial">TM</text>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-brand">TATA MOTORS</span>
                    <span class="logo-tagline">
                        Connecting Aspirations
                    </span>
                </div>
            </div>

            <!-- Desktop Navigation -->
            <nav class="header-nav">
                <a href="/customer/home"
                   class={homeClass}
                   onclick={handleNavClick}
                   data-page="home">
                    Home
                </a>
                <a href="/customer/home"
                   class={carsClass}
                   onclick={handleNavClick}
                   data-page="cars">
                    Our Cars
                </a>
                <a href="/customer/book-test-drive"
                   class={testdriveClass}
                   onclick={handleNavClick}
                   data-page="testdrive">
                    Book Test Drive
                </a>
                <template if:true={isLoggedIn}>
                    <a href="/customer/my-dashboard"
                       class={dashboardClass}
                       onclick={handleNavClick}
                       data-page="dashboard">
                        My Dashboard
                    </a>
                    <a href="/customer/my-bookings"
                       class={bookingsClass}
                       onclick={handleNavClick}
                       data-page="bookings">
                        My Bookings
                    </a>
                    <a href="/customer/my-test-drives"
                       class={testdrivesClass}
                       onclick={handleNavClick}
                       data-page="mydrives">
                        My Test Drives
                    </a>
                </template>
            </nav>

            <!-- Right Actions -->
            <div class="header-actions">
                <template if:true={isLoggedIn}>
                    <div class="user-menu">
                        <div class="user-avatar"
                             onclick={toggleUserMenu}>
                            {userInitial}
                        </div>
                        <template if:true={showUserMenu}>
                            <div class="user-dropdown">
                                <div class="user-info">
                                    <p class="user-name">
                                        {userName}
                                    </p>
                                    <p class="user-email">
                                        {userEmail}
                                    </p>
                                </div>
                                <hr/>
                                <a href="/customer/my-dashboard"
                                   class="dropdown-link">
                                    My Dashboard
                                </a>
                                <a href="/customer/my-bookings"
                                   class="dropdown-link">
                                    My Bookings
                                </a>
                                <hr/>
                                <a href="/customer/logout"
                                   class="dropdown-link logout">
                                    Sign Out
                                </a>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={isLoggedIn}>
                    <a href="/customer/login"
                       class="btn-login">
                        Sign In
                    </a>
                    <a href="/customer/book-test-drive"
                       class="btn-cta">
                        Book Test Drive
                    </a>
                </template>

                <!-- Mobile Hamburger -->
                <button class="hamburger"
                        onclick={toggleMobileMenu}
                        aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>

        <!-- Mobile Navigation -->
        <template if:true={showMobileMenu}>
            <div class="mobile-nav">
                <a href="/customer/home"
                   class="mobile-link">Home</a>
                <a href="/customer/home"
                   class="mobile-link">Our Cars</a>
                <a href="/customer/book-test-drive"
                   class="mobile-link">Book Test Drive</a>
                <template if:true={isLoggedIn}>
                    <a href="/customer/my-dashboard"
                       class="mobile-link">My Dashboard</a>
                    <a href="/customer/my-bookings"
                       class="mobile-link">My Bookings</a>
                    <a href="/customer/my-test-drives"
                       class="mobile-link">My Test Drives</a>
                    <a href="/customer/logout"
                       class="mobile-link logout">Sign Out</a>
                </template>
                <template if:false={isLoggedIn}>
                    <a href="/customer/login"
                       class="mobile-link">Sign In</a>
                </template>
            </div>
        </template>
    </header>
</template>
