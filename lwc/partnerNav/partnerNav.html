<template>
    <nav class="partner-nav">
        <div class="nav-inner">
            <div class="nav-brand" onclick={goDashboard}>
                <div class="brand-logo">TM</div>
                <div class="brand-text">
                    <span class="brand-name">Tata Motors</span>
                    <span class="brand-sub">Partner Portal</span>
                </div>
            </div>

            <div class="nav-links">
                <a class={dashClass} onclick={goDashboard}>Dashboard</a>
                <a class={leadsClass} onclick={goLeads}>Leads</a>
                <a class={testDrivesClass} onclick={goTestDrives}>Test Drives</a>
                <a class={bookingsClass} onclick={goBookings}>Bookings</a>
                <template if:true={isManager}>
                    <a class={approvalsClass} onclick={goApprovals}>
                        Approvals
                        <template if:true={pendingCount}>
                            <span class="badge">{pendingCount}</span>
                        </template>
                    </a>
                </template>
                <a class={paymentsClass} onclick={goPayments}>Payments</a>
                <a class={customersClass} onclick={goCustomers}>Customers</a>
                <template if:true={isManager}>
                    <a class={modelsClass} onclick={goModels}>Models</a>
                    <a class={reportsClass} onclick={goReports}>Reports</a>
                </template>
            </div>

            <div class="nav-right">
                <div class="user-info" onclick={toggleMenu}>
                    <div class="user-avatar">{userInitial}</div>
                    <div class="user-details">
                        <span class="user-name">{userName}</span>
                        <span class="user-role">{userRole}</span>
                    </div>
                    <span class="chevron">▾</span>
                    <template if:true={showMenu}>
                        <div class="dropdown">
                            <a onclick={goProfile} class="drop-item">👤 My Profile</a>
                            <div class="drop-divider"></div>
                            <a onclick={handleLogout} class="drop-item logout">🚪 Logout</a>
                        </div>
                    </template>
                </div>
                <button class="hamburger" onclick={toggleMobile}>☰</button>
            </div>
        </div>

        <template if:true={showMobile}>
            <div class="mobile-menu">
                <a onclick={goDashboard} class="mob-link">Dashboard</a>
                <a onclick={goLeads} class="mob-link">Leads</a>
                <a onclick={goTestDrives} class="mob-link">Test Drives</a>
                <a onclick={goBookings} class="mob-link">Bookings</a>
                <template if:true={isManager}>
                    <a onclick={goApprovals} class="mob-link">Approvals</a>
                </template>
                <a onclick={goPayments} class="mob-link">Payments</a>
                <a onclick={goCustomers} class="mob-link">Customers</a>
                <template if:true={isManager}>
                    <a onclick={goModels} class="mob-link">Models</a>
                    <a onclick={goReports} class="mob-link">Reports</a>
                </template>
                <a onclick={goProfile} class="mob-link">My Profile</a>
                <a onclick={handleLogout} class="mob-link mob-logout">Logout</a>
            </div>
        </template>
    </nav>
</template>
