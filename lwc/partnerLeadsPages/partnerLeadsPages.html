<template>
    <div class="page">
        <div class="page-header">
            <div class="hi">
                <div>
                    <h1>Leads</h1>
                    <p>Manage and track all customer leads</p>
                </div>
            </div>
        </div>
        <div class="page-body">
            <div class="filter-bar">
                <button class={allClass}       data-f="all"       onclick={filter}>All</button>
                <button class={newClass}        data-f="New"       onclick={filter}>New</button>
                <button class={contactedClass}  data-f="Contacted" onclick={filter}>Contacted</button>
                <button class={qualifiedClass}  data-f="Qualified" onclick={filter}>Qualified</button>
                <button class={lostClass}       data-f="Lost"      onclick={filter}>Lost</button>
                <span class="count-tag">{leads.length} lead(s)</span>
            </div>

            <div class="two-col">
                <div class="leads-list">
                    <template if:true={loading}><div class="loading"><div class="spin"></div> Loading leads...</div></template>
                    <template if:true={empty}>
                        <div class="empty-state">
                            <div class="ei">👥</div>
                            <p>No leads found</p>
                        </div>
                    </template>
                    <template for:each={leads} for:item="l">
                        <div key={l.Id} class="lead-card" data-id={l.Id} onclick={selectLead}>
                            <div class="lead-card-top">
                                <div class="lead-av">{l.initial}</div>
                                <div class="lead-info">
                                    <div class="lead-name">{l.firstName} {l.lastName}</div>
                                    <div class="lead-contact">{l.phone}</div>
                                    <div class="lead-contact">{l.email}</div>
                                </div>
                                <span class={l.sc}>{l.Status}</span>
                            </div>
                            <div class="lead-card-meta">
                                <span>🚗 {l.modelName}</span>
                                <span>📍 {l.city}</span>
                                <span>📅 {l.createdDate}</span>
                            </div>
                            <div class="timeline">
                                <div class={l.t1}><div class="tl-dot"></div><div class="tl-label">New</div></div>
                                <div class="tl-line"></div>
                                <div class={l.t2}><div class="tl-dot"></div><div class="tl-label">Contacted</div></div>
                                <div class="tl-line"></div>
                                <div class={l.t3}><div class="tl-dot"></div><div class="tl-label">Qualified</div></div>
                                <div class="tl-line"></div>
                                <div class={l.t4}><div class="tl-dot"></div><div class="tl-label">Converted</div></div>
                            </div>
                        </div>
                    </template>
                </div>

                <template if:true={selectedLead}>
                    <div class="detail-panel">
                        <div class="dp-header">
                            <div class="dp-av">{selectedLead.initial}</div>
                            <div class="dp-title">
                                <div class="dp-name">{selectedLead.firstName} {selectedLead.lastName}</div>
                                <span class={selectedLead.sc}>{selectedLead.Status}</span>
                            </div>
                            <button class="close-btn" onclick={closeDetail}>✕</button>
                        </div>
                        <div class="dp-body">

                            <div class="dp-section">
                                <div class="dp-section-title">Lead Journey</div>
                                <div class="full-timeline">
                                    <div class={selectedLead.ft1}>
                                        <div class="ft-dot">✓</div>
                                        <div class="ft-info">
                                            <div class="ft-stage">New Lead</div>
                                            <div class="ft-desc">Lead created from test drive form</div>
                                        </div>
                                    </div>
                                    <div class="ft-connector"></div>
                                    <div class={selectedLead.ft2}>
                                        <div class="ft-dot">2</div>
                                        <div class="ft-info">
                                            <div class="ft-stage">Contacted</div>
                                            <div class="ft-desc">Customer called and enquiry discussed</div>
                                        </div>
                                    </div>
                                    <div class="ft-connector"></div>
                                    <div class={selectedLead.ft3}>
                                        <div class="ft-dot">3</div>
                                        <div class="ft-info">
                                            <div class="ft-stage">Qualified</div>
                                            <div class="ft-desc">Test drive arranged and confirmed</div>
                                        </div>
                                    </div>
                                    <div class="ft-connector"></div>
                                    <div class={selectedLead.ft4}>
                                        <div class="ft-dot">4</div>
                                        <div class="ft-info">
                                            <div class="ft-stage">Converted</div>
                                            <div class="ft-desc">Booking created successfully</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="dp-section">
                                <div class="dp-section-title">Contact Information</div>
                                <div class="dp-rows">
                                    <div class="dp-row"><span>Phone</span><strong>{selectedLead.phone}</strong></div>
                                    <div class="dp-row"><span>Email</span><strong>{selectedLead.email}</strong></div>
                                    <div class="dp-row"><span>City</span><strong>{selectedLead.city}</strong></div>
                                    <div class="dp-row"><span>Source</span><strong>{selectedLead.LeadSource}</strong></div>
                                    <div class="dp-row"><span>Model</span><strong>{selectedLead.modelName}</strong></div>
                                    <div class="dp-row"><span>Variant</span><strong>{selectedLead.variantName}</strong></div>
                                    <div class="dp-row"><span>Owner</span><strong>{selectedLead.ownerName}</strong></div>
                                    <div class="dp-row"><span>Created</span><strong>{selectedLead.createdDate}</strong></div>
                                </div>
                            </div>

                            <div class="dp-section">
                                <div class="dp-section-title">Update Status</div>
                                <select class="dp-select" onchange={handleStatus}>
                                    <option value="New">New</option>
                                    <option value="Contacted">Contacted</option>
                                    <option value="Qualified">Qualified</option>
                                    <option value="Lost">Lost</option>
                                </select>
                                <button class="btn-primary" onclick={updateStatus}>Update Status</button>
                            </div>

                            <template if:true={isManager}>
                                <div class="dp-section">
                                    <div class="dp-section-title">Assign to Executive</div>
                                    <select class="dp-select" onchange={handleExec}>
                                        <option value="">— Select Executive —</option>
                                        <template for:each={executives} for:item="e">
                                            <option key={e.Id} value={e.Id}>{e.Name}</option>
                                        </template>
                                    </select>
                                    <button class="btn-secondary" onclick={assignLead}>Assign Lead</button>
                                </div>
                            </template>

                            <template if:true={canConvert}>
                                <div class="dp-section">
                                    <button class="btn-convert" onclick={convertLead}>✅ Convert to Booking</button>
                                    <div class="convert-note">Creates Contact, Opportunity and Booking record</div>
                                </div>
                            </template>

                            <template if:true={successMsg}><div class="msg-box success">{successMsg}</div></template>
                            <template if:true={errorMsg}><div class="msg-box error">{errorMsg}</div></template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
